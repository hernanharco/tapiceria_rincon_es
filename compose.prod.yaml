# ============================================================
# compose.prod.yaml — Producción en Hetzner (Tapicería Rincón)
# ============================================================
# Usar con: docker compose -f compose.prod.yaml up -d --build
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: tapiceria_db
      POSTGRES_USER: tapiceria
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tapiceria -d tapiceria_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  api:
    build:
      context: ./backend_tapiceria_api
      dockerfile: dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      PORT: 8000
      DEBUG: "False"
      USE_REMOTE_DB: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: tapiceria_db
      DB_USER: tapiceria
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: "5432"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: tprapi.elrincondeharco.com,localhost
      CORS_ALLOWED_ORIGINS: https://tapiceria-rincon-es.vercel.app,https://tprapi.elrincondeharco.com
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  pgdata:
